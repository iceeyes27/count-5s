<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c55c3d">
  <title>凯格尔运动计时器</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <p class="eyebrow">Kegel Timer</p>
      <h1>凯格尔运动计时器</h1>
      <p class="description" id="modeDescription">普通模式：5 秒收紧，5 秒放松，自动循环，并记录完成轮次。</p>

      <section class="mode-card" aria-label="训练模式">
        <div class="mode-header">
          <p class="mode-label">训练模式</p>
          <p class="mode-note">切换模式会重置当前训练</p>
        </div>
        <div class="mode-switch" aria-label="训练模式切换">
          <button
            id="normalModeButton"
            class="mode-button active"
            type="button"
            data-mode="normal"
            aria-pressed="true"
          >
            普通
            <span>5 秒收紧 / 5 秒放松</span>
          </button>
          <button
            id="quickModeButton"
            class="mode-button"
            type="button"
            data-mode="quick"
            aria-pressed="false"
          >
            快速
            <span>1 秒收紧 / 2 秒放松</span>
          </button>
        </div>
      </section>

      <div class="timer-card" aria-live="polite">
        <p class="phase-label">当前阶段</p>
        <h2 id="phaseName">准备开始</h2>
        <div class="countdown" id="countdown">5</div>
        <p class="subtext" id="phaseHint">点击开始后进入 5 秒收紧</p>
      </div>

      <div class="controls">
        <button id="startButton" class="primary" type="button">开始</button>
        <button id="pauseButton" type="button">暂停</button>
        <button id="resetButton" type="button">重置</button>
      </div>

      <div class="stats">
        <article class="stat-box">
          <span class="stat-title">本次轮次</span>
          <strong id="cycleCount">0</strong>
        </article>
        <article class="stat-box">
          <span class="stat-title">本次总秒数</span>
          <strong id="elapsedTime">0</strong>
        </article>
        <article class="stat-box">
          <span class="stat-title">当日累计轮次</span>
          <strong id="dailyCount">0</strong>
        </article>
        <article class="stat-box status-box">
          <span class="stat-title">打卡状态</span>
          <strong id="checkInStatus">未打卡</strong>
        </article>
        <article class="stat-box">
          <span class="stat-title">已打卡天数</span>
          <strong id="checkedDays">0</strong>
        </article>
        <article class="stat-box">
          <span class="stat-title">累计打卡轮次</span>
          <strong id="totalCount">0</strong>
        </article>
      </div>

      <section class="summary-card" aria-label="打卡总览">
        <div>
          <p class="summary-label">打卡总览</p>
          <p class="summary-note" id="summaryText">今天还没开始，累计 0 天 / 0 轮</p>
          <p class="sync-note" id="syncStatus">Cloudflare 未连接，当前使用本机缓存</p>
        </div>
      </section>

      <section class="history-card" aria-label="最近打卡记录">
        <div class="history-header">
          <p class="history-label">最近打卡记录</p>
          <p class="history-note">按日期查看最近每天累计轮次</p>
        </div>
        <div class="history-list" id="historyList">还没有打卡记录</div>
      </section>

      <div class="rhythm">
        <div class="rhythm-step active" id="squeezeStep">
          <span>1</span>
          <p id="squeezeStepLabel">收紧 5 秒</p>
        </div>
        <div class="rhythm-step" id="relaxStep">
          <span>2</span>
          <p id="relaxStepLabel">放松 5 秒</p>
        </div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
